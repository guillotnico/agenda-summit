* { box-sizing: border-box; }
body { margin: 0; background: #fff; color: #0a0a0a; font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
.page { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }

/* Language bar */
.langbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.langsel {
  font-family: inherit; font-size: 13px; font-weight: 600; color: #0a0a0a;
  background: #fafafa; border: 2px solid #e4e4e4; border-radius: 999px;
  padding: 8px 14px; cursor: pointer; transition: border-color .12s ease;
}
.langsel:hover { border-color: #0a0a0a; }
.langsel:focus-visible { outline: 3px solid #c6ff00; outline-offset: 2px; }

/* Header */
.kicker { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: #6b6b6b; font-weight: 600; margin-bottom: 10px; }
h1 { font-size: 44px; line-height: 1.02; margin: 0 0 12px; font-weight: 700; letter-spacing: -.02em; }
.sub { font-size: 16px; line-height: 1.5; color: #3a3a3a; margin: 0; }
.eventmeta { font-size: 14px; line-height: 1.5; color: #0a0a0a; font-weight: 600; margin: 0 0 12px; }
.eventmeta a { color: #5a7a00; text-decoration: underline; }
.fluo { background: #c6ff00; padding: 1px 6px; border-radius: 4px; font-weight: 600; color: #0a0a0a; }
.counter { display: inline-flex; align-items: baseline; gap: 8px; margin-top: 20px; padding: 10px 16px; border: 2px solid #0a0a0a; border-radius: 999px; }
.counter-num { font-size: 22px; font-weight: 700; }
.counter-label { font-size: 13px; color: #6b6b6b; font-weight: 500; }

/* Theme parcours */
.themes { margin: 28px 0 8px; padding: 20px; background: #0a0a0a; border-radius: 16px; }
.themes-head { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: #c6ff00; font-weight: 700; margin-bottom: 6px; }
.themes-sub { font-size: 13px; color: #b5b5b5; margin: 0 0 14px; line-height: 1.45; }
.theme-btns { display: flex; flex-wrap: wrap; gap: 10px; }
.theme-btn { font-family: inherit; font-size: 13px; font-weight: 600; color: #fff; background: #1f1f1f; border: 2px solid #3a3a3a; padding: 10px 14px; border-radius: 999px; cursor: pointer; transition: all .12s ease; display: inline-flex; align-items: center; gap: 7px; }
.theme-btn:hover { border-color: #c6ff00; transform: translateY(-2px); }
.theme-btn:focus-visible { outline: 3px solid #c6ff00; outline-offset: 2px; }
.theme-btn.on { background: #c6ff00; color: #0a0a0a; border-color: #c6ff00; box-shadow: 0 6px 20px rgba(198,255,0,.35); }
.theme-btn .count { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; background: rgba(255,255,255,.12); padding: 1px 7px; border-radius: 999px; }
.theme-btn.on .count { background: rgba(0,0,0,.15); }

/* Conflict banner */
.banner { display: none; align-items: center; gap: 10px; background: #fff0f0; border: 2px solid #e23b3b; border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; font-size: 14px; color: #b02020; font-weight: 600; }
.banner.show { display: flex; }
.banner .dot { width: 8px; height: 8px; border-radius: 50%; background: #e23b3b; flex-shrink: 0; }

/* Slots */
.slot { margin-bottom: 30px; }
.slot-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.slot-time { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
.slot-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #6b6b6b; font-weight: 600; }
.slot-note { font-size: 13px; line-height: 1.5; color: #5a7a00; background: #f3ffd0; border-left: 4px solid #c6ff00; border-radius: 8px; padding: 10px 14px; margin: 0 0 12px; font-weight: 600; }
.cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

.card { position: relative; text-align: left; background: #fafafa; border: 2px solid #e4e4e4; border-radius: 14px; padding: 16px; cursor: pointer; transition: transform .12s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease, opacity .12s ease; font-family: inherit; color: #0a0a0a; display: flex; flex-direction: column; gap: 6px; }
.card:hover { border-color: #0a0a0a; transform: translateY(-2px); }
.card:focus-visible { outline: 3px solid #c6ff00; outline-offset: 2px; }
.card.active { background: #ecffb0; border-color: #c6ff00; box-shadow: 0 0 0 3px #c6ff00, 0 8px 24px rgba(150,200,0,.28); }
.card.active:hover { border-color: #c6ff00; }
.card.blocked { cursor: not-allowed; opacity: .5; background: #fff5f5; border-color: #ffcdcd; border-style: dashed; }
.card.blocked:hover { transform: none; border-color: #ffcdcd; }
.card.blocked .card-title, .card.blocked .card-speaker, .card.blocked .card-desc { color: #9a6a6a; }
.conflict-badge { position: absolute; top: -9px; right: 14px; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; background: #e23b3b; color: #fff; padding: 3px 8px; border-radius: 6px; display: none; }
.card.blocked .conflict-badge { display: inline-block; }

.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #b0b0b0; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; transition: all .12s ease; }
.check.on { background: #0a0a0a; border-color: #0a0a0a; color: #c6ff00; }
.card.blocked .check { border-color: #d8a0a0; }
.room-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; background: #0a0a0a; color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: 700; }

.time-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .04em; color: #6b6b6b; font-weight: 700; }
.reco { margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #5a7a00; background: #dfff8a; padding: 3px 8px; border-radius: 6px; }
.card-title { font-size: 15px; font-weight: 700; line-height: 1.25; }
.card-speaker { font-size: 12px; font-weight: 600; color: #4a4a4a; }
.card-desc { font-size: 12.5px; line-height: 1.45; color: #555; }
.card.active .card-desc, .card.active .card-speaker { color: #3a4a10; }

/* Agenda */
.agenda-wrap { margin-top: 56px; padding-top: 32px; border-top: 2px solid #0a0a0a; }
h2 { font-size: 28px; font-weight: 700; margin: 0 0 18px; letter-spacing: -.02em; }
.empty { font-size: 15px; color: #6b6b6b; font-style: italic; line-height: 1.5; }
.timeline { display: flex; flex-direction: column; gap: 0; }
.row { display: flex; gap: 18px; padding: 14px 0; border-bottom: 1px solid #eaeaea; }
.row.pick { background: #f3ffd0; margin: 0 -12px; padding: 14px 12px; border-radius: 10px; border-bottom: 1px solid transparent; border-left: 4px solid #c6ff00; }
.row-time { flex-shrink: 0; width: 56px; font-family: 'Space Mono', monospace; }
.row-start { font-size: 15px; font-weight: 700; }
.row-end { font-size: 11px; color: #999; }
.row-title { font-size: 15px; font-weight: 700; line-height: 1.25; margin-bottom: 4px; }
.row-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.row-room { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .05em; text-transform: uppercase; background: #0a0a0a; color: #c6ff00; padding: 2px 7px; border-radius: 5px; font-weight: 700; }
/* Per-room colors */
.room-tag[data-room="dickesb"], .row-room[data-room="dickesb"] { background:#1f6feb; color:#fff; }
.room-tag[data-room="luftballons"], .row-room[data-room="luftballons"] { background:#d6336c; color:#fff; }
.room-tag[data-room="sternenhimmel"], .row-room[data-room="sternenhimmel"] { background:#f08c00; color:#fff; }
.room-tag[data-room="zukunft"], .row-room[data-room="zukunft"] { background:#2f9e44; color:#fff; }
.card.active .room-tag[data-room] { color:#fff; }
/* Room legend */
.legend { display:flex; flex-wrap:wrap; gap:10px; margin:0; }
.legend-item { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:#3a3a3a; }
.legend-wrap { display:flex; align-items:center; flex-wrap:wrap; gap:10px 14px; margin:18px 0 4px; }
.legend-wrap .legend { margin:0; }
.legend-label { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#6b6b6b; font-weight:700; }
.legend-dot { width:12px; height:12px; border-radius:4px; flex-shrink:0; }
.legend-dot[data-room="dickesb"]{ background:#1f6feb; }
.legend-dot[data-room="luftballons"]{ background:#d6336c; }
.legend-dot[data-room="sternenhimmel"]{ background:#f08c00; }
.legend-dot[data-room="zukunft"]{ background:#2f9e44; }
.row-speaker { font-size: 13px; color: #555; font-weight: 500; }

@media (max-width: 600px) {
  .cards { grid-template-columns: 1fr; }
  .page { padding: 24px 16px 64px; }
  h1 { font-size: 32px; }
  h2 { font-size: 24px; }
  .sub { font-size: 15px; }
  .card-top { flex-wrap: wrap; }
  .reco { margin-left: 0; }
  .themes { padding: 16px; }
  .langsel { width: 100%; }
  .langbar { justify-content: stretch; }
}
@media (max-width: 380px) {
  h1 { font-size: 27px; }
  .page { padding: 20px 12px 56px; }
  .row { gap: 12px; }
  .row-time { width: 48px; }
}
@media (prefers-reduced-motion: reduce) { .card { transition: none; } .card:hover { transform: none; } }
</style>
</head>

// ══ DATA (English, never translated) ════════════════════════════════
const ROOMS = { dickesb:"Dickes B", luftballons:"99 Luftballons", sternenhimmel:"Sternenhimmel", zukunft:"Zukunftwerkstatt" };
const toMin = (t) => { const [h,m] = t.split(":").map(Number); return h*60+m; };
const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const overlaps = (a,b) => toMin(a.start) < toMin(b.end) && toMin(b.start) < toMin(a.end);

// Fixed items: title/speaker keys reference UI (translatable labels), rest stays English
const FIXED = [
  { id:"breakfast", start:"8:30", end:"9:15", room:null, tkey:"breakfast", spkKey:"breakfastSpk" },
  { id:"keynote", start:"9:15", end:"10:00", room:"dickesb", tkey:"keynote", spkKey:null, spk:"Katya Vinnichenko & Matt Thompson" },
  { id:"lunch", start:"12:00", end:"13:00", room:null, tkey:"lunch", spkKey:"lunchSpk" },
  { id:"coffee", start:"14:30", end:"15:00", room:null, tkey:"coffee", spkKey:"coffeeSpk" },

  { id:"happyhour", start:"18:00", end:"19:30", room:null, tkey:"happyhour", spkKey:"happyhourSpk", speakerHtml:'<a href="https://share.google/TYQ3GtXoG8UDNmsHk" target="_blank" rel="noopener" style="color:#5a7a00;font-weight:600;">Holzmarktstraße 25, 10243 Berlin</a>' },
];

    { id:"s1-lb", room:"luftballons", start:"10:00", end:"11:20", title:"Building AI apps with the Google ecosystem", speaker:"Marina Coelho", desc:"Hands-on session on the modern Builder Stack: from prototype to UI, AI features and a scalable backend." },
    { id:"s1-sh", room:"sternenhimmel", start:"10:00", end:"11:20", title:"The Art of Engaging Tech Talks", speaker:"Zack Akil", desc:"Workshop on delivering memorable, entertaining technical content. 250+ talks of experience, live demos included." },
    { id:"s1-zw", room:"zukunft", start:"10:00", end:"12:00", title:"GenMedia + Gemma Roundtables", speaker:"Guillaume Vernade · Gus Martins · Ian Ballantyne", desc:"GenMedia roundtable (10:00–11:00) then Gemma (11:00–12:00). ⚠ Runs until 12:00, overlaps Block 2." },
  ]},
  { id:"slot2", label:"Block 2", time:"11:30 – 12:00", options:[
    { id:"s2-db", room:"dickesb", start:"11:30", end:"12:00", title:"Open Sesame to the Monolith", speaker:"Abdelfettah Sghiouar", desc:"Raiding legacy code with multi-agent AI. Real case: a Rails monolith modernized in 5 days." },
    { id:"s2-lb", room:"luftballons", start:"11:30", end:"12:00", title:"Google Workspace in the Agentic Era", speaker:"Chanel Greco", desc:"New agentic Workspace tools to automate tasks and integrations in a unified, secure environment." },
    { id:"s2-sh", room:"sternenhimmel", start:"11:30", end:"12:00", title:"What Humanoid Robots Still Can't Do", speaker:"Martin Krcek", desc:"Under the hood of humanoids: ROS2/DDS architecture, vision, LiDAR, LLM integration. Examples from the Senti robot." },

  ]},
  { id:"slot3", label:"Block 3", time:"13:00 – 14:30", options:[

    { id:"s3-lb", room:"luftballons", start:"13:00", end:"14:30", title:"Gemini Workshop — Multimodal & Long-Context", speaker:"Laurent Picard", desc:"Interactive workshop: multimodal video transcription, knowledge graphs over 1M tokens, image pipelines. Bring your laptop!" },
    { id:"s3-sh", room:"sternenhimmel", start:"13:00", end:"14:30", title:"Community Sessions", speaker:"TBA", desc:"Two community sessions (13:00–13:40 and 13:50–14:30). Details coming soon." },
    { id:"s3-zw", room:"zukunft", start:"13:00", end:"14:15", title:"Regulatory Impact for Developer Ecosystem", speaker:"Nathalie Pereira", desc:"The EU Digital Rulebook as an architectural constraint: privacy by design, minor protection, Android (13:00–14:15)." },
  ]},
  { id:"slot4", label:"regional", time:"15:00 – 16:00", options:[
    { id:"s4-db", room:"dickesb", start:"15:00", end:"16:00", title:"DACH & CEE", speaker:"Katsiaryna Skwarek", desc:"Regional time for DACH & Central/Eastern Europe." },
    { id:"s4-lb", room:"luftballons", start:"15:00", end:"16:00", title:"Southern Europe", speaker:"Alexis Einhorn", desc:"Regional time for Southern Europe." },
    { id:"s4-sh", room:"sternenhimmel", start:"15:00", end:"16:00", title:"UK/I, France, Benelux & Nordics", speaker:"Pauline Bonnin", desc:"Regional time for UK/I, France, Benelux & Nordics." },
    { id:"s4-zw", room:"zukunft", start:"15:00", end:"16:00", title:"Developers & Companies Sentiment", speaker:"Noa Havazelet", desc:"Roundtable on developer and company sentiment." },
  ]},
];

const OPT = {};
SLOTS.forEach(s => s.options.forEach(o => OPT[o.id] = o));

const THEMES = [
  { id:"ia", labelKey:"themeIa", icon:"🤖", opts:["s1-db","s2-zw","s3-db"] },
  { id:"builder", labelKey:"themeBuilder", icon:"🛠️", opts:["s1-lb","s2-lb","s3-lb"] },
  { id:"communaute", labelKey:"themeCommunity", icon:"👥", opts:["s1-sh","s2-db","s3-sh"] },
  { id:"techpointue", labelKey:"themeTech", icon:"🔬", opts:["s1-zw","s2-sh","s3-zw"] },
  // Fun tracks
  { id:"banana", labelKey:"themeBanana", icon:"🍌", opts:["s1-db","s2-zw","s3-lb"] },
  { id:"stage", labelKey:"themeStage", icon:"🎤", opts:["s1-sh","s2-db","s3-db"] },
  { id:"robot", labelKey:"themeRobot", icon:"🤯", opts:["s1-lb","s2-sh","s3-db"] },
  { id:"rebels", labelKey:"themeRebels", icon:"🏛️", opts:["s1-zw","s2-db","s3-zw"] },
];

// ══ LANGUAGE → REGIONAL BLOCK ═══════════════════════════════════════
// Maps each UI language to the Regional Time option (slot4) most relevant
// to it, so the "suggested" badge follows the chosen language.
const LANG_REGION = {
  // DACH & Central/Eastern Europe
  de:"s4-db", cs:"s4-db", sk:"s4-db", sl:"s4-db", hr:"s4-db", hu:"s4-db", pl:"s4-db", ro:"s4-db", bg:"s4-db",
  // Southern Europe
  it:"s4-lb", es:"s4-lb", pt:"s4-lb", el:"s4-lb", mt:"s4-lb",
  // UK/I, France, Benelux & Nordics (+ Baltics, Irish)
  en:"s4-sh", fr:"s4-sh", nl:"s4-sh", da:"s4-sh", sv:"s4-sh", fi:"s4-sh", et:"s4-sh", lv:"s4-sh", lt:"s4-sh", ga:"s4-sh"
};

// ══ STATE ═══════════════════════════════════════════════════════════
const picks = {};
let activeTheme = null;
let lang = pickInitialLang();
const t = (k) => (UI[lang] && UI[lang][k]) || UI.en[k];

function pickInitialLang() {
  const nav = (navigator.languages || [navigator.language || "en"]);
  for (const l of nav) {
    const code = l.toLowerCase().split("-")[0];
    if (UI[code]) return code;
  }
  return "en";
}

function conflictFor(slotId, opt) {
  for (const s of SLOTS) {
    if (s.id === slotId) continue;
    const chosenId = picks[s.id];
    if (!chosenId) continue;
    if (overlaps(opt, OPT[chosenId])) return OPT[chosenId];
  }
  return null;
}

// ══ BUILD LANGUAGE SELECTOR ═════════════════════════════════════════
const langsel = document.getElementById("langsel");
Object.keys(LANG_NAMES).sort((a,b) => LANG_NAMES[a].localeCompare(LANG_NAMES[b]))
  .forEach(code => {
    const o = document.createElement("option");
    o.value = code; o.textContent = LANG_NAMES[code];
    langsel.appendChild(o);
  });
langsel.value = lang;
langsel.addEventListener("change", () => { lang = langsel.value; document.documentElement.lang = lang; applyLang(); render(); });

// ══ BUILD SLOTS ═════════════════════════════════════════════════════
const slotsEl = document.getElementById("slots");
SLOTS.forEach(slot => {
  const sec = document.createElement("section");
  sec.className = "slot";
  sec.innerHTML = `<div class="slot-head"><div class="slot-time">${slot.time}</div><div class="slot-label" data-slotlabel="${slot.id}">${slot.label}</div></div>${slot.id === "slot4" ? `<p class="slot-note" data-slotnote></p>` : ""}<div class="cards"></div>`;
  const cardsEl = sec.querySelector(".cards");
  slot.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "card"; btn.setAttribute("aria-pressed","false");
    btn.dataset.slot = slot.id; btn.dataset.opt = opt.id;
    btn.innerHTML = `
      <span class="conflict-badge" data-conflict></span>
      <div class="card-top">
        <span class="check"></span>
        <span class="room-tag" data-room="${opt.room}">${ROOMS[opt.room]}</span>
        <span class="time-tag">${opt.start}–${opt.end}</span>
        
      </div>
      <div class="card-title">${esc(opt.title)}</div>
      <div class="card-speaker">${esc(opt.speaker)}</div>
      <div class="card-desc">${esc(opt.desc)}</div>`;
    btn.addEventListener("click", () => toggle(slot.id, opt.id));
    cardsEl.appendChild(btn);
  });
  slotsEl.appendChild(sec);
});

// ══ BUILD ROOM LEGEND ═══════════════════════════════════════════════
const legendEl = document.getElementById("legend");
Object.keys(ROOMS).forEach(roomKey => {
  const item = document.createElement("span");
  item.className = "legend-item";
  item.innerHTML = `<span class="legend-dot" data-room="${roomKey}"></span>${ROOMS[roomKey]}`;
  legendEl.appendChild(item);
});

// ══ BUILD THEME BUTTONS ═════════════════════════════════════════════
const themeBtnsEl = document.getElementById("theme-btns");
THEMES.forEach(theme => {
  const btn = document.createElement("button");
  btn.className = "theme-btn"; btn.dataset.theme = theme.id;
  btn.innerHTML = `<span data-themelabel>${theme.icon}</span>`;
  btn.addEventListener("click", () => applyTheme(theme.id));
  themeBtnsEl.appendChild(btn);
});

function applyTheme(themeId) {
  Object.keys(picks).forEach(k => delete picks[k]);
  if (activeTheme === themeId) { activeTheme = null; render(); return; }
  const theme = THEMES.find(t => t.id === themeId);
  theme.opts.forEach(optId => {
    const opt = OPT[optId];
    const slot = SLOTS.find(s => s.options.some(o => o.id === optId));
    if (picks[slot.id]) return;
    if (conflictFor(slot.id, opt)) return;
    picks[slot.id] = optId;
  });
  activeTheme = themeId;
  render();
}

function toggle(slotId, optId) {
  const opt = OPT[optId];
  const isActive = picks[slotId] === optId;
  if (!isActive && conflictFor(slotId, opt)) return;
  picks[slotId] = isActive ? undefined : optId;
  activeTheme = null;
  render();
}

// ══ APPLY LANGUAGE TO STATIC TEXT ═══════════════════════════════════
function applyLang() {
  document.getElementById("t-kicker").textContent = t("kicker");
  document.getElementById("t-h1").textContent = t("h1");
  document.getElementById("t-eventmeta").innerHTML = t("eventMeta");
  document.getElementById("t-sub").innerHTML = t("eventIntro") + " " + t("sub");
  const _cl = document.getElementById("t-counterLabel"); if (_cl) _cl.textContent = t("counterLabel");
  document.getElementById("t-themesHead").textContent = t("themesHead");
  document.getElementById("t-themesSub").textContent = t("themesSub");
  document.getElementById("t-agendaTitle").textContent = t("agendaTitle");
  document.querySelector('[data-slotlabel="slot4"]').textContent = t("regional");
  const slotNote = document.querySelector("[data-slotnote]");
  if (slotNote) slotNote.textContent = t("regionalNote");
  const roomsLbl = document.getElementById("t-roomsLabel");
  if (roomsLbl) roomsLbl.textContent = t("roomsLabel");
  // conflict badges + theme labels updated in render()
}

// ══ RENDER ══════════════════════════════════════════════════════════
function render() {
  let anyConflict = null;

  document.querySelectorAll(".card").forEach(btn => {
    const slotId = btn.dataset.slot, optId = btn.dataset.opt, opt = OPT[optId];
    const active = picks[slotId] === optId;
    const conflict = !active ? conflictFor(slotId, opt) : null;
    const blocked = !!conflict;
    if (blocked && !anyConflict) anyConflict = { opt, conflict };
    btn.classList.toggle("active", active);
    btn.classList.toggle("blocked", blocked);
    btn.setAttribute("aria-pressed", active ? "true":"false");
    btn.setAttribute("aria-disabled", blocked ? "true":"false");
    const check = btn.querySelector(".check");
    check.classList.toggle("on", active);
    check.textContent = active ? "✓" : "";
    const cb = btn.querySelector("[data-conflict]");
    if (cb) cb.textContent = t("conflict");
  });

  const count = Object.values(picks).filter(Boolean).length;
  const _c = document.getElementById("count"); if (_c) _c.textContent = count;

  document.querySelectorAll(".theme-btn").forEach(btn => {
    const theme = THEMES.find(t => t.id === btn.dataset.theme);
    btn.classList.toggle("on", activeTheme === theme.id);
    const lbl = btn.querySelector("[data-themelabel]");
    lbl.textContent = `${theme.icon} ${t(theme.labelKey)}`;
  });

  const banner = document.getElementById("banner");
  if (anyConflict) {
    document.getElementById("banner-text").textContent =
      t("bannerTpl").replace("{title}", anyConflict.conflict.title)
        .replace("{start}", anyConflict.conflict.start).replace("{end}", anyConflict.conflict.end);
    banner.classList.add("show");
  } else banner.classList.remove("show");

  // agenda
  const items = FIXED.map(f => ({
    id:f.id, start:f.start, end:f.end, room:f.room,
    title: f.tkey ? t(f.tkey) : f.title,
    speaker: f.spkKey ? t(f.spkKey) : f.spk,
    speakerHtml: f.speakerHtml || null
  }));
  SLOTS.forEach(slot => {
    const pickId = picks[slot.id];
    if (pickId) { const o = OPT[pickId]; items.push({ id:o.id, start:o.start, end:o.end, title:o.title, room:o.room, speaker:o.speaker }); }
  });
  items.sort((a,b) => toMin(a.start) - toMin(b.start));

  let html = "";
  if (count === 0) html += `<p class="empty">${esc(t("empty"))}</p>`;
  html += '<div class="timeline">';
  items.forEach(item => {
    const isPick = !FIXED.some(f => f.id === item.id);
    html += `<div class="row ${isPick?'pick':''}"><div class="row-time"><div class="row-start">${item.start}</div><div class="row-end">${item.end}</div></div><div class="row-body"><div class="row-title">${esc(item.title)}</div><div class="row-meta">${item.room?`<span class="row-room" data-room="${item.room}">${ROOMS[item.room]}</span>`:''}<span class="row-speaker">${item.speakerHtml ? item.speakerHtml : esc(item.speaker)}</span></div></div></div>`;
  });
  html += '</div>';
  document.getElementById("agenda").innerHTML = html;
}

// ══ INIT ════════════════════════════════════════════════════════════
document.documentElement.lang = lang;
applyLang();
render();
</script>
